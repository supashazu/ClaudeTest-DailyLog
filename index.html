<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1D9E75">
  <meta name="description" content="Post-Ramadan daily fitness tracker by Shaz">
  <title>comeback.log</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --syne:'Syne',sans-serif;
      --mono:'DM Mono',monospace;
      --accent:#1D9E75;
      --accent-soft:#E1F5EE;
      --accent-text:#085041;
      --warn:#BA7517;
      --warn-soft:#FAEEDA;
      --warn-text:#633806;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0f0f0f;
        --surface:#1a1a1a;
        --raised:#222;
        --border:rgba(255,255,255,0.1);
        --border2:rgba(255,255,255,0.2);
        --ink:#f0f0f0;
        --muted:#999;
        --hint:#555;
      }
    }
    @media(prefers-color-scheme:light){
      :root{
        --bg:#f7f7f5;
        --surface:#fff;
        --raised:#f1efea;
        --border:rgba(0,0,0,0.08);
        --border2:rgba(0,0,0,0.15);
        --ink:#1a1a1a;
        --muted:#666;
        --hint:#aaa;
      }
    }
    html,body{background:var(--bg);color:var(--ink);font-family:var(--syne);min-height:100vh}
    .app{padding:1.5rem 1rem 3rem;max-width:520px;margin:0 auto}
    .header{margin-bottom:1.5rem}
    .header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
    .logo{font-size:20px;font-weight:700;letter-spacing:-0.3px}
    .logo span{color:var(--accent)}
    .date-tag{font-family:var(--mono);font-size:11px;color:var(--hint)}
    .subtitle{font-size:12px;color:var(--muted);font-family:var(--mono)}
    .streak-bar{display:flex;gap:6px;margin-top:14px}
    .streak-dot{width:28px;height:8px;border-radius:4px;background:var(--raised);border:0.5px solid var(--border2)}
    .streak-dot.done{background:var(--accent)}
    .streak-dot.today{background:var(--accent);opacity:0.5;animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:0.9}}
    .streak-label{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
    .section{margin-bottom:1.25rem}
    .section-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;font-family:var(--mono)}
    .day-row{display:flex;gap:8px;flex-wrap:wrap}
    .day-chip{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border2);font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--ink);transition:all 0.15s}
    .day-chip:hover{border-color:var(--accent);color:var(--accent)}
    .day-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .check-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px}
    .check-card:hover{border-color:var(--border2)}
    .check-card.checked{border-color:var(--accent);background:var(--accent-soft)}
    .check-icon{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
    .check-card.checked .check-icon{background:var(--accent);border-color:var(--accent)}
    .check-icon-inner{width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);opacity:0}
    .check-card.checked .check-icon-inner{opacity:1}
    .check-label{font-size:13px;font-weight:500;line-height:1.3}
    .check-card.checked .check-label{color:var(--accent-text)}
    .energy-row{display:flex;gap:6px;align-items:center}
    .energy-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;font-family:var(--mono);color:var(--muted);transition:all 0.15s;display:flex;align-items:center;justify-content:center}
    .energy-btn:hover{border-color:var(--accent)}
    .energy-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .energy-label{font-size:12px;color:var(--muted);margin-left:6px;font-family:var(--mono)}
    .note-input,textarea{width:100%;padding:10px 12px;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface);color:var(--ink);font-size:13px;font-family:var(--syne);resize:none;height:64px;line-height:1.5}
    .note-input:focus,textarea:focus{outline:none;border-color:var(--accent)}
    .macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .macro-card{background:var(--raised);border-radius:8px;padding:10px 12px}
    .macro-card-label{font-size:10px;color:var(--hint);font-family:var(--mono);margin-bottom:4px}
    .macro-card input{width:100%;background:transparent;border:none;outline:none;font-size:20px;font-weight:500;color:var(--ink);font-family:var(--mono)}
    .macro-card-unit{font-size:11px;color:var(--muted);font-family:var(--mono)}
    .log-btn{width:100%;padding:13px;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:500;font-family:var(--syne);border:none;cursor:pointer;letter-spacing:0.02em;transition:all 0.15s;margin-top:4px}
    .log-btn:hover{opacity:0.88}
    .log-btn:active{transform:scale(0.98)}
    .history-item{padding:12px 14px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
    .history-day{font-size:13px;font-weight:500}
    .history-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
    .history-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
    .htag{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:12px;background:var(--accent-soft);color:var(--accent-text)}
    .htag.miss{background:var(--warn-soft);color:var(--warn-text)}
    .tab-row{display:flex;gap:2px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border);padding-bottom:0}
    .tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
    .tab:hover{color:var(--ink)}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .view{display:none}
    .view.active{display:block}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
    .summary-card{background:var(--raised);border-radius:8px;padding:12px}
    .summary-card-val{font-size:24px;font-weight:500;font-family:var(--mono)}
    .summary-card-label{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
    .bar-chart{display:flex;flex-direction:column;gap:6px}
    .bar-row{display:flex;align-items:center;gap:8px}
    .bar-day-label{font-size:11px;font-family:var(--mono);color:var(--muted);width:24px;text-align:right}
    .bar-track{flex:1;height:10px;background:var(--raised);border-radius:5px;overflow:hidden}
    .bar-fill{height:100%;background:var(--accent);border-radius:5px;transition:width 0.4s ease}
    .bar-val{font-size:11px;font-family:var(--mono);color:var(--muted);width:28px}
    .empty-state{text-align:center;padding:2rem 1rem;color:var(--hint);font-size:13px;font-family:var(--mono)}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">comeback<span>.log</span></div>
      <div class="date-tag" id="today-date"></div>
    </div>
    <div class="subtitle">post-ramadan daily tracker</div>
    <div class="streak-bar" id="streak-bar"></div>
    <div class="streak-label" id="streak-label">week 1 of comeback</div>
  </div>
  <div class="tab-row">
    <div class="tab active" onclick="switchTab('log')">today</div>
    <div class="tab" onclick="switchTab('history')">history</div>
    <div class="tab" onclick="switchTab('summary')">summary</div>
  </div>
  <div class="view active" id="view-log">
    <div class="section">
      <div class="section-label">session focus</div>
      <div class="day-row" id="focus-chips"></div>
    </div>
    <div class="section">
      <div class="section-label">completed</div>
      <div class="check-grid" id="check-grid"></div>
    </div>
    <div class="section">
      <div class="section-label">energy level</div>
      <div class="energy-row" id="energy-row"></div>
    </div>
    <div class="section">
      <div class="section-label">macros today</div>
      <div class="macro-row">
        <div class="macro-card">
          <div class="macro-card-label">kcal</div>
          <input type="number" id="kcal" placeholder="0" min="0" max="5000">
          <div class="macro-card-unit">kcal</div>
        </div>
        <div class="macro-card">
          <div class="macro-card-label">protein</div>
          <input type="number" id="protein" placeholder="0" min="0" max="300">
          <div class="macro-card-unit">g</div>
        </div>
        <div class="macro-card">
          <div class="macro-card-label">carbs</div>
          <input type="number" id="carbs" placeholder="0" min="0" max="500">
          <div class="macro-card-unit">g</div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">notes</div>
      <textarea id="notes" placeholder="how did it feel? anything to flag..."></textarea>
    </div>
    <button class="log-btn" onclick="saveLog()">log today</button>
  </div>
  <div class="view" id="view-history">
    <div id="history-list"></div>
  </div>
  <div class="view" id="view-summary">
    <div class="summary-grid" id="summary-grid"></div>
    <div class="section-label" style="margin-bottom:10px">weekly workout days</div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>
</div>
<script>
const FOCUSES=['push','legs','pull','functional','active recovery','full body'];
const CHECKS=['gym done','ran/walked','hit protein','slept 7h+','no junk','hydrated'];
const DAY_ABBR=['su','mo','tu','we','th','fr','sa'];
let state={focus:null,checks:new Set(),energy:null};
function getStorage(){try{return JSON.parse(localStorage.getItem('comeback_log')||'{}')}catch{return{}}}
function setStorage(d){try{localStorage.setItem('comeback_log',JSON.stringify(d))}catch{}}
function getTodayKey(){return new Date().toISOString().slice(0,10)}
function formatDate(k){const d=new Date(k+'T00:00:00');return d.toLocaleDateString('en-MY',{weekday:'short',month:'short',day:'numeric'})}
function initDateHeader(){const d=new Date();document.getElementById('today-date').textContent=d.toLocaleDateString('en-MY',{weekday:'short',month:'short',day:'numeric'})}
function renderStreakBar(){
  const data=getStorage();const bar=document.getElementById('streak-bar');bar.innerHTML='';
  const today=getTodayKey();
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().slice(0,10);const dot=document.createElement('div');dot.className='streak-dot'+(key===today?' today':(data[key]?' done':''));bar.appendChild(dot)}
  const streak=calcStreak(data);document.getElementById('streak-label').textContent=streak+' day streak — keep going'
}
function calcStreak(data){let s=0,d=new Date();while(true){const k=d.toISOString().slice(0,10);if(data[k]){s++;d.setDate(d.getDate()-1)}else break}return s}
function renderFocusChips(){const el=document.getElementById('focus-chips');el.innerHTML='';FOCUSES.forEach(f=>{const c=document.createElement('div');c.className='day-chip'+(state.focus===f?' active':'');c.textContent=f;c.onclick=()=>{state.focus=state.focus===f?null:f;renderFocusChips()};el.appendChild(c)})}
function renderChecks(){const el=document.getElementById('check-grid');el.innerHTML='';CHECKS.forEach(label=>{const card=document.createElement('div');card.className='check-card'+(state.checks.has(label)?' checked':'');card.innerHTML=`<div class="check-icon"><div class="check-icon-inner"></div></div><div class="check-label">${label}</div>`;card.onclick=()=>{if(state.checks.has(label))state.checks.delete(label);else state.checks.add(label);renderChecks()};el.appendChild(card)})}
function renderEnergy(){const el=document.getElementById('energy-row');el.innerHTML='';['1','2','3','4','5'].forEach(v=>{const btn=document.createElement('div');btn.className='energy-btn'+(state.energy===v?' active':'');btn.textContent=v;btn.onclick=()=>{state.energy=state.energy===v?null:v;renderEnergy()};el.appendChild(btn)});const label=document.createElement('div');label.className='energy-label';label.textContent=state.energy?(state.energy<=2?'low':state.energy>=4?'high':'mid'):'';el.appendChild(label)}
function saveLog(){const data=getStorage();const key=getTodayKey();data[key]={focus:state.focus,checks:[...state.checks],energy:state.energy,kcal:parseInt(document.getElementById('kcal').value)||0,protein:parseInt(document.getElementById('protein').value)||0,carbs:parseInt(document.getElementById('carbs').value)||0,notes:document.getElementById('notes').value.trim()};setStorage(data);renderStreakBar();renderHistory();renderSummary();const btn=document.querySelector('.log-btn');btn.textContent='logged!';setTimeout(()=>{btn.textContent='log today'},1800)}
function renderHistory(){const data=getStorage();const el=document.getElementById('history-list');const keys=Object.keys(data).sort().reverse();if(!keys.length){el.innerHTML='<div class="empty-state">no logs yet — check in today!</div>';return}el.innerHTML='';keys.forEach(k=>{const e=data[k];const item=document.createElement('div');item.className='history-item';const left=document.createElement('div');left.innerHTML=`<div class="history-day">${formatDate(k)}</div><div class="history-meta">${e.focus||'no focus set'} · energy ${e.energy||'—'}/5</div>`;const right=document.createElement('div');right.className='history-tags';if(e.kcal)right.innerHTML+=`<span class="htag">${e.kcal} kcal</span>`;if(e.protein)right.innerHTML+=`<span class="htag">${e.protein}g P</span>`;const gymDone=e.checks&&e.checks.includes('gym done');right.innerHTML+=gymDone?'<span class="htag">gym</span>':'<span class="htag miss">rest</span>';item.appendChild(left);item.appendChild(right);el.appendChild(item)})}
function renderSummary(){const data=getStorage();const keys=Object.keys(data);const total=keys.length;const gym=keys.filter(k=>data[k].checks&&data[k].checks.includes('gym done')).length;const avgP=total?Math.round(keys.reduce((a,k)=>a+(data[k].protein||0),0)/total):0;const avgK=total?Math.round(keys.reduce((a,k)=>a+(data[k].kcal||0),0)/total):0;document.getElementById('summary-grid').innerHTML=[[gym,'gym sessions'],[total,'days logged'],[avgK+' kcal','avg daily intake'],[avgP+'g','avg protein/day']].map(([v,l])=>`<div class="summary-card"><div class="summary-card-val">${v}</div><div class="summary-card-label">${l}</div></div>`).join('');const chart=document.getElementById('bar-chart');chart.innerHTML='';for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().slice(0,10);const abbr=DAY_ABBR[d.getDay()];const entry=data[key];const done=entry&&entry.checks&&entry.checks.includes('gym done');chart.innerHTML+=`<div class="bar-row"><div class="bar-day-label">${abbr}</div><div class="bar-track"><div class="bar-fill" style="width:${done?100:(entry?20:0)}%"></div></div><div class="bar-val">${done?'done':(entry?'rest':'—')}</div></div>`}}
function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['log','history','summary'][i]===tab));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+tab))}
initDateHeader();renderStreakBar();renderFocusChips();renderChecks();renderEnergy();renderHistory();renderSummary();
</script>
</body>
</html>
